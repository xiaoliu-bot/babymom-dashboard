name: Test With Secret
on:
  repository_dispatch:
    types: [test-secret]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - run: |
          git config user.name "test"
          git add README.md
          git diff --cached --quiet && echo "NO_CHANGES" || echo "HAS_CHANGES"
      - run: date
