<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>赞赏支持 · Thanks for Your Support</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-1: #0f0c29;
    --bg-2: #302b63;
    --bg-3: #24243e;
    --accent-1: #ffd86b;
    --accent-2: #f7a116;
    --accent-3: #ff6b6b;
    --wechat-green: #07c160;
    --alipay-blue: #1677ff;
    --text: #f5f5f7;
    --text-soft: rgba(245, 245, 247, 0.72);
    --card-bg: rgba(255, 255, 255, 0.06);
    --card-border: rgba(255, 255, 255, 0.12);
  }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
      "Microsoft YaHei", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* 背景装饰：星空 + 流星 */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.6), transparent 50%),
      radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.5), transparent 50%),
      radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.4), transparent 50%),
      radial-gradient(1.5px 1.5px at 85% 60%, rgba(255,255,255,0.7), transparent 50%),
      radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.4), transparent 50%),
      radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.5), transparent 50%),
      radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,0.6), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* 背景光晕 */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(247, 161, 22, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(22, 119, 255, 0.18) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 980px;
    margin: 0 auto;
    padding: 64px 24px 48px;
  }

  /* 头部 */
  header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeInUp 0.8s ease-out both;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 999px;
    font-size: 13px;
    color: var(--text-soft);
    backdrop-filter: blur(10px);
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }

  .badge .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-2);
    box-shadow: 0 0 8px var(--accent-2);
    animation: pulse 2s ease-in-out infinite;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 2.8rem);
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
    background: linear-gradient(120deg, #fff 0%, var(--accent-1) 60%, var(--accent-2) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: clamp(0.95rem, 1.6vw, 1.1rem);
    color: var(--text-soft);
    max-width: 560px;
    margin: 0 auto;
  }

  /* 二维码区域 */
  .qr-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 28px;
    margin-bottom: 48px;
  }

  .qr-card {
    position: relative;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 32px 24px 24px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    text-align: center;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                box-shadow 0.4s ease,
                border-color 0.4s ease;
    overflow: hidden;
    animation: fadeInUp 0.8s ease-out both;
  }

  .qr-card:nth-child(1) { animation-delay: 0.1s; }
  .qr-card:nth-child(2) { animation-delay: 0.2s; }

  .qr-card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 1px;
    background: linear-gradient(135deg, transparent 0%, var(--glow, transparent) 50%, transparent 100%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .qr-card:hover {
    transform: translateY(-6px);
    border-color: rgba(255, 255, 255, 0.2);
    box-shadow: 0 20px 60px -10px rgba(0, 0, 0, 0.5);
  }

  .qr-card:hover::before { opacity: 1; }

  .qr-card.wechat { --glow: rgba(7, 193, 96, 0.5); }
  .qr-card.alipay { --glow: rgba(22, 119, 255, 0.5); }

  .card-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
  }

  .wechat .card-icon {
    background: linear-gradient(135deg, #07c160 0%, #00a854 100%);
  }

  .alipay .card-icon {
    background: linear-gradient(135deg, #1677ff 0%, #0e5fd9 100%);
  }

  .card-icon svg {
    width: 28px;
    height: 28px;
    fill: #fff;
  }

  .card-title {
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .card-sub {
    font-size: 0.85rem;
    color: var(--text-soft);
    margin-bottom: 20px;
  }

  .qr-wrap {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.1),
      0 12px 32px rgba(0, 0, 0, 0.3);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .qr-card:hover .qr-wrap {
    transform: scale(1.04);
  }

  .qr-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 8px;
  }

  /* 角落的扫描提示 */
  .scan-hint {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 18px;
    font-size: 0.82rem;
    color: var(--text-soft);
    padding: 6px 12px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 999px;
  }

  .scan-hint::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 1.6s ease-in-out infinite;
  }

  .wechat .scan-hint { color: #5be39a; }
  .alipay .scan-hint { color: #6fa6ff; }

  /* 文案区 */
  .note {
    text-align: center;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 28px 24px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    animation: fadeInUp 0.8s 0.3s ease-out both;
  }

  .note p {
    color: var(--text-soft);
    font-size: 0.95rem;
    line-height: 1.8;
    max-width: 640px;
    margin: 0 auto;
  }

  .note .em {
    color: var(--accent-1);
    font-weight: 500;
  }

  /* 底部 */
  footer {
    margin-top: 40px;
    text-align: center;
    color: rgba(245, 245, 247, 0.4);
    font-size: 0.8rem;
    letter-spacing: 0.5px;
  }

  /* 动画 */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(1.3); }
  }

  /* 响应式 */
  @media (max-width: 640px) {
    .container { padding: 40px 16px 32px; }
    header { margin-bottom: 36px; }
    .qr-wrap { width: 200px; height: 200px; }
    .qr-card { padding: 26px 18px 20px; }
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <span class="badge"><span class="dot"></span>支持创作者</span>
    <h1>感谢您的支持</h1>
    <p class="subtitle">如果我的内容对你有所帮助或启发，欢迎扫码赞赏，让创作继续发生 ✨</p>
  </header>

  <section class="qr-grid">

    <!-- 支付宝 -->
    <div class="qr-card alipay">

      </div>
      <div class="card-title">支付宝</div>
      <div class="card-sub">Alipay</div>
      <div class="qr-wrap">
        <img src="assets/alipay.jpg" alt="支付宝收款码" />
      </div>
      <div class="scan-hint">打开支付宝扫一扫</div>
    </div>

  </section>

  <div class="note">
    <p>
      每一份支持，都是继续写下去的理由。<br />
      你的 <span class="em">鼓励</span>，
      会化作深夜里的一杯咖啡、一盏亮到凌晨的灯。☕🌙
    </p>
  </div>

  <footer>
    Made with ♥ · Thank you for being here
  </footer>

</div>

</body>
</html>
