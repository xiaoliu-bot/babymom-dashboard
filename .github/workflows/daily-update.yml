name: Daily Dashboard Update

on:
  schedule:
    # At 11:40 Beijing time (03:40 UTC)
    - cron: "40 3 * * *"
    # At 13:10 Beijing time (05:10 UTC)
    - cron: "10 5 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            index.html
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch latest ETF data
        run: |
          python3 << 'PYEOF'
import urllib.request, json, datetime
today = datetime.date.today().strftime('%Y-%m-%d')
def get_etf_data(code):
    url = f"https://api.fund.eastmoney.com/f10/lsjz?fundCode={code}&pageIndex=1&pageSize=5"
    req = urllib.request.Request(url, headers={"Referer": "https://fund.eastmoney.com/"})
    with urllib.request.urlopen(req, timeout=15) as r:
        return json.loads(r.read())
codes = {"159995":"芯片ETF","159870":"化工ETF","588050":"科创50ETF","515750":"科技50ETF","513180":"恒生科技ETF"}
results = []
for code, name in codes.items():
    try:
        d = get_etf_data(code)
        items = d.get("Data",{}).get("LSJZList",[])
        if items:
            item = items[0]
            results.append({"name":name,"code":code,"date":item["FSRQ"],"nav":item["DWJZ"],"change":item["JZZZL"]+"%"})
    except:
        results.append({"name":name,"code":code,"date":"N/A","nav":"N/A","change":"N/A"})
with open("etf_data.json","w") as f:
    json.dump({"date":today,"etfs":results},f,ensure_ascii=False,indent=2)
PYEOF
      - name: Generate updated index.html
        run: |
          python3 << 'PYEOF'
import json, re
with open("etf_data.json") as f:
    data = json.load(f)
with open("index.html") as f:
    html = f.read()
rows = ""
for etf in data["etfs"]:
    c = "green" if etf["change"].startswith("+") else "red" if etf["change"].startswith("-") else "gray"
    s = "+" if not etf["change"].startswith(("+","-")) else ""
    rows += f"<tr><td>{etf['name']}</td><td>{etf['code']}</td><td>{etf['date']}</td><td>{etf['nav']}</td><td style='color:{c};font-weight:bold'>{s}{etf['change']}</td></tr>\n"
marker = f'<!-- AUTO-UPDATED {data["date"]} -->\n<script>window.AUTO_ETF={json.dumps(data,ensure_ascii=False)};</script>'
if "AUTO_ETF" in html:
    html = re.sub(r'<!-- AUTO-UPDATED .*? -->[\s]*<script>window.AUTO_ETF.*?</script>', marker, html, flags=re.DOTALL)
else:
    html = html.replace("</body>", marker + "\n</body>")
with open("index.html","w") as f:
    f.write(html)
PYEOF
      - name: Commit and push
        run: |
          git config user.name "OpenClaw Bot"
          git config user.email "openclaw@agent"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: update ETF data $(date +'%Y-%m-%d')"
          git push

# updated
