name: 每日仪表盘更新

on:
  schedule:
    # 北京时间 11:40 / 13:10
    - cron: "40 3 * * 1-5"
    - cron: "10 5 * * 1-5"
  repository_dispatch:
    types: [trigger-update]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 获取数据（东方财富）
        run: python3 fetch_data.py

      - name: 更新 HTML
        run: python3 update_html.py

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add babymom-dashboard.html etf_data.json index_data.json
          git diff --cached --quiet || { echo "no changes"; exit 0; }
          git commit -m "chore: 自动更新看板 $(date '+%Y-%m-%d %H:%M')"
          git push
