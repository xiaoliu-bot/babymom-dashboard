name: 每日仪表盘更新

on:
  schedule:
    - cron: "40 3 * * *"
    - cron: "10 5 * * *"
  repository_dispatch:
    types: [trigger-update]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 获取 ETF 数据
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import jsonimport datetime
          today = datetime.date.today().strftime('%Y-%m-%d')

def get_etf_data(code):
     url = f"https://api.fund.eastmoney.com/f10/lsjz?fundCode={code}&pageIndex=1&pageSize=5"
     req = urllib.request.Request(
        url,
        headers={"Referer": "https://fund.eastmoney.com/"}
    )
    with urllib.request.urlopen(req, timeout=15) as r:
        return json.loads(r.read())

codes = {
    "159995": "芯片ETF",
    "159870": "化工ETF",
    "588050": "科创50ETF",
    "515750": "科技50ETF",
    "513180": "恒生科技ETF",
}

results = []
for code, name in codes.items():
    try:
        d = get_etf_data(code)
        items = d.get("Data", {}).get("LSJZList", [])
        if items:
            item = items[0]
            results.append({
                "name": name,
                "code": code,
                "date": item["FSRQ"],
                "nav": item["DWJZ"],
                "change": str(item["JZZZL"]) + "%"
            })
    except Exception:
        results.append({
            "name": name,
            "code": code,
            "date": "N/A",
            "nav": "N/A",
            "change": "N/A"
        })

etf_data = {"date": today, "etfs": results}
with open("etf_data.json", "w", encoding="utf-8") as f:
    json.dump(etf_data, f, ensure_ascii=False, indent=2)
PYEOF

      - name: 写入 api/etf.json
        run: |
          python3 << 'PYEOF'
import json
import os

with open("etf_data.json", encoding="utf-8") as f:
    data = json.load(f)

os.makedirs("api", exist_ok=True)
with open("api/etf.json", "w", encoding="utf-8") as f:
    json.dump(data, f, ensure_ascii=False, indent=2)
PYEOF

      - name: 更新 index.html
        run: |
          python3 << 'PYEOF'
import json
import re

with open("etf_data.json", encoding="utf-8") as f:
    data = json.load(f)

with open("index.html", encoding="utf-8") as f:
    html = f.read()

rows = ""
for etf in data["etfs"]:
    change = etf["change"]
    if change.startswith("+"):
        color = "green"
    elif change.startswith("-"):
        color = "red"
    else:
        color = "gray"
    sign = "+" if not change.startswith(("+", "-")) else ""
    rows += (
        f'<tr>'
        f'<td>{etf["name"]}</td>'
        f'<td>{etf["code"]}</td>'
        f'<td>{etf["date"]}</td>'
        f'<td>{etf["nav"]}</td>'
        f'<td style="color:{color};font-weight:bold">{sign}{change}</td>'
        f'</tr>\n'
    )

marker = f'<!-- AUTO_UPDATE {data["date"]} -->\n<script>window.AUTO_ETF={json.dumps(data, ensure_ascii=False)};</script>'

if "AUTO_ETF" in html:
    html = re.sub(
        r'<!-- AUTO_UPDATE.*?-->\s*<script>window\.AUTO_ETF.*?</script>',
        marker,
        html,
        flags=re.DOTALL
    )
else:
    html = html.replace("</body>", marker + "\n</body>")

with open("index.html", "w", encoding="utf-8") as f:
    f.write(html)
PYEOF

      - name: 提交与推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html api/etf.json
          git diff --cached --quiet && echo "No changes" || \
          git commit -m "chore: update ETF data $(date '+%Y-%m-%d %H:%M')" && \
          git push

