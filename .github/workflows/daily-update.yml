name: 每日仪表盘更新

on:
  schedule:
    - cron: "40 3 * * *"
    - cron: "10 5 * * *"
  repository_dispatch:
    types: [trigger-update]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 环境诊断
        run: |
          echo "STEP1-ENV pwd=$(pwd) python=$(python3 --version 2>&1) curl=$(curl --version | head -1)"

      - name: 获取 ETF 数据
        run: |
          import json
          import datetime
          import urllib.request

          today = datetime.date.today().strftime('%Y-%m-%d')

          def get_etf_data(code):
              url = f"https://api.fund.eastmoney.com/f10/lsjz?fundCode={code}&pageIndex=1&pageSize=5"
              req = urllib.request.Request(
                  url,
                  headers={"Referer": "https://fund.eastmoney.com/"}
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read())

          # 将 codes 定义移到这里，用多行字典，避免 YAML 解析错误
          codes = {
              "159995": "芯片ETF",
              "159870": "化工ETF",
              "588050": "科创50ETF",
              "515750": "科技50ETF",
              "513180": "恒生科技ETF",
          }

          results = []
          for code, name in codes.items():
              try:
                  d = get_etf_data(code)
                  items = d.get("Data", {}).get("LSJZList", [])
                  if items:
                      item = items[0]
                      results.append({
                          "name": name,
                          "code": code,
                          "date": item["FSRQ"],
                          "nav": item["DWJZ"],
                          "change": str(item["JZZL"]) + "%"
                      })
                      print('OK ' + name + ': ' + item['FSRQ'] + ' ' + item['DWJZ'], flush=True)
                  else:
                      print('EMPTY ' + name, flush=True)
                      results.append({"name": name, "code": code, "date": 'N/A', "nav": 'N/A', "change": 'N/A'})
              except Exception as e:
                  print('FAIL ' + name + ': ' + str(e), flush=True)
                  results.append({"name": name, "code": code, "date": 'N/A', "nav": 'N/A', "change": 'N/A'})

          ok = sum(1 for r in results if r['date'] != 'N/A')
          print('TOTAL_OK=' + str(ok) + '/' + str(len(results)), flush=True)

          etf_data = {'date': today, 'etfs': results}
          with open('etf_data.json', 'w', encoding='utf-8') as f:
              json.dump(etf_data, f, ensure_ascii=False, indent=2)
          print('etf_data.json written OK', flush=True)
   
          echo "STEP3-WRITE-JSON-DONE"

      - name: 更新 index.html
        run: |
          echo "STEP4-UPDATE-HTML-START"
          python3 << 'PYEOF'

with open('etf_data.json', encoding='utf-8') as f:
    data = json.load(f)
with open('index.html', encoding='utf-8') as f:
    html = f.read()
rows = ''
for etf in data['etfs']:
    change = etf['change']
    color = 'green' if change.startswith('+') else 'red' if change.startswith('-') else 'gray'
    sign = '+' if not change.startswith(('+', '-')) else ''
    rows += '<tr><td>' + etf['name'] + '</td><td>' + etf['code'] + '</td><td>' + etf['date'] + '</td><td>' + etf['nav'] + '</td><td style=color:' + color + ';font-weight:bold>' + sign + change + '</td></tr>
'
marker = '<!-- AUTO_UPDATE ' + data['date'] + ' -->
<script>window.AUTO_ETF=' + json.dumps(data, ensure_ascii=False) + ';</script>'
if 'AUTO_ETF' in html:
    html = re.sub(r'<!-- AUTO_UPDATE.*?-->\s*<script>window\.AUTO_ETF.*?</script>', marker, html, flags=re.DOTALL)
else:
    html = html.replace('</body>', marker + '
</body>')
with open('index.html', 'w', encoding='utf-8') as f:
    f.write(html)
print('index.html updated with', len(data['etfs']), 'ETFs')
PYEOF
          echo "STEP4-UPDATE-HTML-DONE"

      - name: 提交与推送
        run: |
          echo "STEP5-GIT-START"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html api/etf.json
          if git diff --cached --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'chore: update ETF data '2026-07-18 16:51''
            git push
          fi
          echo "STEP5-GIT-DONE"
