name: Daily Dashboard Update

on:
  schedule:
    # At 11:40 Beijing time (03:40 UTC)
    - cron: "40 3 * * *"
    # At 13:10 Beijing time (05:10 UTC)
    - cron: "10 5 * * *"
  repository_dispatch:
    types:
      - trigger-update

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            index.html
            api/etf.json
          sparse-checkout-cone-mode: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch latest ETF data
        run: |
          python3 << 'PYEOF'
import urllib.request, json, datetime

today = datetime.date.today().strftime('%Y-%m-%d')

def get_etf_data(code):
    url = f"https://api.fund.eastmoney.com/f10/lsjz?fundCode={code}&pageIndex=1&pageSize=5"
    req = urllib.request.Request(url, headers={"Referer": "https://fund.eastmoney.com/"})
    with urllib.request.urlopen(req, timeout=15) as r:
        return json.loads(r.read())

codes = {
    "159995": "芯片ETF",
    "159870": "化工ETF",
    "588050": "科创50ETF",
    "515750": "科技50ETF",
    "513180": "恒生科技ETF",
}

results = []
for code, name in codes.items():
    try:
        d = get_etf_data(code)
        items = d.get("Data", {}).get("LSJZList", [])
        if items:
            item = items[0]
            results.append({
                "name": name,
                "code": code,
                "date": item["FSRQ"],
                "nav": item["DWJZ"],
                "change": str(item["JZZZL"]) + "%",
            })
    except Exception as e:
        results.append({"name": name, "code": code, "date": "N/A", "nav": "N/A", "change": "N/A"})

etf_data = {"date": today, "etfs": results}
with open("etf_data.json", "w") as f:
    json.dump(etf_data, f, ensure_ascii=False, indent=2)

print("Fetched:", json.dumps(etf_data, ensure_ascii=False))
PYEOF
      - name: Update api/etf.json
        run: |
          python3 << 'PYEOF'
import json, os

with open("etf_data.json") as f:
    data = json.load(f)

# Write to api/etf.json
os.makedirs("api", exist_ok=True)
with open("api/etf.json", "w") as f:
    json.dump(data, f, ensure_ascii=False, indent=2)

print(f"Written api/etf.json with {len(data['etfs'])} ETFs")
PYEOF
      - name: Update index.html
        run: |
          python3 << 'PYEOF'
import json, re

with open("etf_data.json") as f:
    data = json.load(f)

with open("index.html") as f:
    html = f.read()

rows = ""
for etf in data["etfs"]:
    change = etf["change"]
    if change.startswith("+"):
        color = "green"
    elif change.startswith("-"):
        color = "red"
    else:
        color = "gray"
    sign = "+" if not change.startswith(("+", "-")) else ""
    rows += f'<tr><td>{etf["name"]}</td><td>{etf["code"]}</td><td>{etf["date"]}</td><td>{etf["nav"]}</td><td style="color:{color};font-weight:bold">{sign}{change}</td></tr>\n'

marker = f'<!-- AUTO-UPDATED {data["date"]} -->\n<script>window.AUTO_ETF={json.dumps(data,ensure_ascii=False)};</script>'
if "AUTO_ETF" in html:
    html = re.sub(r'<!-- AUTO-UPDATED .*? -->[\s]*<script>window\.AUTO_ETF.*?</script>', marker, html, flags=re.DOTALL)
else:
    html = html.replace("</body>", marker + "\n</body>")

with open("index.html", "w") as f:
    f.write(html)

print(f"Updated index.html with {len(data['etfs'])} ETFs")
PYEOF
      - name: Commit and push
        run: |
          git config user.name "OpenClaw Bot"
          git config user.email "openclaw@agent"
          git add index.html api/etf.json
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: update ETF data $(date +'%Y-%m-%d %H:%M')" && git push)
