name: 每日仪表盘更新

on:
  schedule:
    - cron: "40 3 * * *"
    - cron: "10 5 * * *"
  repository_dispatch:
    types: [trigger-update]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 获取 ETF 数据
        run: python3 fetch_etf.py

      - name: 更新 index.html
        run: python3 update_html.py

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html api/etf.json etf_data.json
          git diff --cached --stat
          git commit -m "chore: update ETF data $(date '+%Y-%m-%d %H:%M')" || echo "no changes"
          git push || echo "push failed"
