name: Daily Dashboard Update

on:
  schedule:
    # At 21:30 Beijing time (13:30 UTC), every day
    - cron: "30 13 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            index.html
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch latest ETF data
        id: fetch
        run: |
          python3 << 'PYEOF'
import urllib.request, json, datetime

today = datetime.date.today().strftime('%Y-%m-%d')

def get_etf_data(code):
    url = f"https://api.fund.eastmoney.com/f10/lsjz?fundCode={code}&pageIndex=1&pageSize=5"
    req = urllib.request.Request(url, headers={"Referer": "https://fund.eastmoney.com/"})
    with urllib.request.urlopen(req, timeout=15) as r:
        return json.loads(r.read())

codes = {
    "159995": "芯片ETF",
    "159870": "化工ETF",
    "588050": "科创50ETF",
    "515750": "科技50ETF",
    "513180": "恒生科技ETF",
}

results = []
for code, name in codes.items():
    try:
        d = get_etf_data(code)
        items = d.get("Data", {}).get("LSJZList", [])
        if items:
            item = items[0]
            results.append({
                "name": name,
                "code": code,
                "date": item["FSRQ"],
                "nav": item["DWJZ"],
                "change": item["JZZZL"] + "%",
            })
    except Exception as e:
        results.append({"name": name, "code": code, "date": "N/A", "nav": "N/A", "change": "N/A"})

with open("etf_data.json", "w") as f:
    json.dump({"date": today, "etfs": results}, f, ensure_ascii=False, indent=2)

print("Fetched data:", json.dumps({"date": today, "etfs": results}, ensure_ascii=False))
PYEOF
      - name: Generate updated index.html
        run: |
          python3 << 'PYEOF'
import json, re, datetime

with open("etf_data.json") as f:
    data = json.load(f)

# Read the current index.html
with open("index.html") as f:
    html = f.read()

# Update the ETF data table
# Build new table rows from data
etf_rows = ""
for etf in data["etfs"]:
    change = etf["change"]
    color = "green" if change.startswith("+") else "red" if change.startswith("-") else "gray"
    sign = "+" if not change.startswith("+") and not change.startswith("-") else ""
    etf_rows += f'''<tr>
    <td>{etf["name"]}</td>
    <td>{etf["code"]}</td>
    <td>{etf["date"]}</td>
    <td>{etf["nav"]}</td>
    <td style="color:{color};font-weight:bold">{sign}{change}</td>
</tr>
'''

# Find and replace the ETF data section - look for a table with ETF rows
# Try to find a pattern like "159995" or "芯片ETF" in the HTML
import re

# Simple approach: just append/update a data section at the bottom
update_marker = f'''<!-- AUTO-UPDATED DATA {data["date"]} -->
<script>
window.AUTO_ETF_DATA = {json.dumps(data, ensure_ascii=False)};
</script>'''

if "AUTO_ETF_DATA" in html:
    html = re.sub(r'<!-- AUTO-UPDATED DATA .*? -->[\s]*<script>[\s]*window\.AUTO_ETF_DATA.*?</script>', update_marker, html, flags=re.DOTALL)
else:
    html = html.replace("</body>", update_marker + "\n</body>")

with open("index.html", "w") as f:
    f.write(html)

print(f"Updated index.html with data from {data['date']}")
print(f"ETFs updated: {len(data['etfs'])}")
PYEOF
      - name: Commit and push
        run: |
          git config user.name "OpenClaw Bot"
          git config user.email "openclaw@agent"
          git add index.html
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: update ETF data $(date +'%Y-%m-%d %H:%M')"
          git push
